<div class="w-screen h-screen bg-black p-5 flex flex-col items-center justify-center">
  
  @if (!estaLleno()) {
    <img class="h-70 mb-5 rounded-lg shadow-lg shadow-white/20" src="img/qu-.jpg" alt="Gato Parado">
    <h1 class="text-white text-2xl mb-5">{{titulo}}</h1>
    
    <div class="w-64 bg-gray-600 rounded-full h-4 mb-4">
      <div class="bg-white h-4 rounded-full transition-all duration-300" 
        [style.width.%]="(contador() / 25) * 100">
      </div>
    </div>

    <button 
      class="px-4 py-2 bg-white text-black rounded hover:bg-gray-200 focus:outline-none focus:ring-1 focus:ring-red-500 font-bold" 
      (click)="incrementar()" 
      type="button">
      Pescado
    </button>

  } @else {
    <div class="w-screen h-screen bg-black p-5 flex flex-col items-center justify-center">
      <img class="h-70 mb-2 rounded-lg shadow-lg shadow-white/20 animate-bounce" src="img/gato-lleno.png" alt="Gato Feliz">
      <h2 class="text-white text-2xl mb-5">¡El gato está muy feliz!</h2>
      
      <button 
        class="px-4 py-2 bg-white text-black rounded hover:bg-gray-200 focus:outline-none focus:ring-1 focus:ring-red-500 font-bold animate-fade-in" 
        (click)="reiniciar()" 
        type="button">
        Regresar al juego
      </button>
    </div>
  }
</div>
